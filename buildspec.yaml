version: 0.2

phases:
  pre_build:
    commands:
      - aws --version
      - $(aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin <account>.dkr.ecr.ap-south-1.amazonaws.com)
  build:
    commands:
      - docker build -t brain-tasks-app .
      - docker tag brain-tasks-app:latest <account>.dkr.ecr.ap-south-1.amazonaws.com/brain-tasks-app:latest
  post_build:
    commands:
      - docker push <account>.dkr.ecr.ap-south-1.amazonaws.com/brain-tasks-app:latest
      - kubectl apply -f k8s/
