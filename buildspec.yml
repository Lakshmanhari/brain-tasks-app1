version: 0.2

env:
  variables:
    AWS_REGION: ap-south-1
    ECR_REPO: brain-tasks-app
    IMAGE_TAG: latest

phases:
  pre_build:
    commands:
      - echo Logging in to ECR
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin <YOUR_ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com

  build:
    commands:
      - echo Build Docker image
      - docker build -t $ECR_REPO:$IMAGE_TAG .

  post_build:
    commands:
      - echo Tag image
      - docker tag $ECR_REPO:$IMAGE_TAG <YOUR_ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPO:$IMAGE_TAG
      - echo Push image
      - docker push <YOUR_ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPO:$IMAGE_TAG
